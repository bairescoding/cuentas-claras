name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore
    
    - name: Verify Code Formatting
      run: dotnet format --verify-no-changes
      continue-on-error: true

    - name: Publish with dotnet
      run: dotnet publish -c Release -o release --nologo

    - name: Copy index.html to 404.html for SPA support
      run: cp release/wwwroot/index.html release/wwwroot/404.html

    - name: Fix base-href for GitHub Pages
      run: |
        sed -i 's|<base href="/" />|<base href="/cuentas-claras/" />|g' release/wwwroot/index.html
        sed -i 's|<base href="/" />|<base href="/cuentas-claras/" />|g' release/wwwroot/404.html

    - name: Fix base-href in service worker
      run: |
        sed -i 's|const base = "/";|const base = "/cuentas-claras/";|g' release/wwwroot/service-worker.js

    # Hack to allow GitHub pages to serve folders starting with underscore (_framework)
    - name: Add .nojekyll file
      run: touch release/wwwroot/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'release/wwwroot'
      continue-on-error: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
